name: Build

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

  repository_dispatch:

  workflow_dispatch:

env:
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run linter
      run: yarn lint

    - name: Build
      run: yarn build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.node-version }}
        path: dist/
        retention-days: 30

    - name: Packaged dist
      run: |
        tar -czvf "sub-web-dist.tar.gz" dist/
        echo "DIST_DIR=$PWD" >> $GITHUB_ENV
        echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        ls

    - name: Delete current release assets
      uses: andreaswilli/delete-release-assets-action@v3.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        tag: latest
        deleteOnlyFromDrafts: false

    - name: Create and Upload Release
      id: upload_release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        release_name: Release ${{ env.BUILDTIME }}
        tag: latest
        file_glob: true
        overwrite: true
        file: ${{ env.DIST_DIR }}/*.tar.gz

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 3
